databaseChangeLog:
  - changeSet:
      id: 008-create-tags-table
      author: Matheus Cunha
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                 name: project_id
                 type: TEXT
                 constraints:
                   foreignKeyName: fk_tags_project
                   references: projects(id)
                   nullable: false
                   deleteCascade: true

              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: color
                  type: TEXT

              - column:
                  name: created_at
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TEXT

        - createIndex:
            indexName: idx_tags_project
            tableName: tags
            columns:
              - column:
                  name: project_id

        - addUniqueConstraint:
            tableName: tags
            columnNames: project_id, name
            constraintName: uk_tags_project_name

      rollback:
        - dropTable:
            tableName: tags