databaseChangeLog:
  - changeSet:
      id: 007-create-credentials-table
      author: Matheus Cunha
      changes:
        - createTable:
            tableName: credentials
            columns:
              - column:
                  name: id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: project_id
                  type: TEXT
                  constraints:
                    foreignKeyName: fk_credentials_project
                    references: projects(id)
                    nullable: false
                    deleteCascade: true

              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: secret_type
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: payload_encrypted
                  type: BLOB
                  constraints:
                    nullable: false

              - column:
                  name: encryption_iv
                  type: BLOB
                  constraints:
                    nullable: false

              - column:
                  name: encryption_auth_tag
                  type: BLOB
                  constraints:
                    nullable: false

              - column:
                  name: notes
                  type: TEXT

              - column:
                  name: related_url
                  type: TEXT

              - column:
                  name: created_at
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TEXT

        - createIndex:
            indexName: idx_credentials_project
            tableName: credentials
            columns:
              - column:
                  name: project_id
      rollback:
        - dropTable:
            tableName: credentials
