databaseChangeLog:
  - changeSet:
      id: 003-create-snippets-table
      author: Matheus Cunha
      changes:
        - createTable:
            tableName: snippets
            columns:
              - column:
                  name: id
                  type: TEXT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: project_id
                  type: TEXT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_snippets_project
                    references: projects(id)
                    deleteCascade: true

              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: language
                  type: TEXT

              - column:
                  name: snippet_type
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TEXT

        - createIndex:
            indexName: idx_snippets_project
            tableName: snippets
            columns:
              - column:
                  name: project_id

      rollback:
        - dropTable:
            tableName: snippets